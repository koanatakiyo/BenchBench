  judge_model:
    
    display_name: gemini-2.5-pro
    provider: gemini
    model: gemini-2.5-pro
    batch_size: 16
    max_concurrent_requests: 8
    temperature: 0.0
    top_p: 0.9
    max_new_tokens:
      default: 2048
      mcq_single: 512
      mcq_multi: 960
      open_ended: 2048
      structured: 3072


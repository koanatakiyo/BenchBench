stage3:
  # Add multiple datasets here; each entry declares its designers and output dir.
  datasets:
    - dataset: csbench_en
      output_dir: ../outputs/stage3_answers/csbench_en
      designers:
        gpt5mini:
          designer_model: gpt-5-mini
          provider_dir: ../outputs/stage2_questions/csbench_en/openai_gpt5mini
